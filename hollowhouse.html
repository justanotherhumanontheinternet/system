<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Hollow House</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Share+Tech+Mono&display=swap');

  :root {
    --black: #0a0a0f;
    --deep: #0f0f18;
    --panel: #12121e;
    --border: #1e1e30;
    --crimson: #8b0000;
    --crimson-bright: #b50000;
    --crimson-glow: #c0000044;
    --teal: #2d5a5a;
    --teal-bright: #3d7a7a;
    --parchment: #c9b99a;
    --bone: #e8dcc8;
    --ash: #7a7a8a;
    --mono: 'Share Tech Mono', monospace;
    --serif: 'IM Fell English', Georgia, serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--black);
    color: var(--parchment);
    font-family: var(--serif);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, #1a0a0a 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, #0a0a1a 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1; opacity: 0.35;
  }

  #app { position: relative; z-index: 2; max-width: 900px; margin: 0 auto; padding: 20px; }

  #game-header {
    text-align: center; padding: 30px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  #game-header h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--bone);
    letter-spacing: 0.12em;
    text-shadow: 0 0 40px var(--crimson-glow), 0 0 80px #00000088;
    font-style: italic;
  }
  #game-header .subtitle {
    font-size: 0.8rem; font-family: var(--mono);
    color: var(--ash); letter-spacing: 0.3em; margin-top: 6px;
    text-transform: uppercase;
  }

  #hud {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 20px; align-items: center;
  }
  .hud-pill {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 14px;
    font-family: var(--mono); font-size: 0.75rem; color: var(--ash);
    display: flex; align-items: center; gap: 6px;
  }
  .hud-pill span.val { color: var(--bone); }
  #sanity-bar-wrap { flex: 1; min-width: 120px; }
  #sanity-bar-bg { background: var(--border); border-radius: 2px; height: 6px; }
  #sanity-bar { height: 6px; border-radius: 2px; background: var(--teal-bright);
    transition: width 0.5s, background 0.5s; }

  #game-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 32px 36px;
    position: relative;
    overflow: hidden;
    min-height: 320px;
  }
  #game-panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--crimson) 50%, transparent);
    opacity: 0.6;
  }

  #scene-chapter {
    font-family: var(--mono); font-size: 0.68rem;
    color: var(--crimson); letter-spacing: 0.35em;
    text-transform: uppercase; margin-bottom: 18px;
  }

  #scene-title {
    font-size: 1.55rem; color: var(--bone);
    margin-bottom: 18px; font-style: italic;
    line-height: 1.3;
  }

  #scene-text {
    font-size: 1.02rem; line-height: 1.85;
    color: var(--parchment); margin-bottom: 28px;
  }
  #scene-text p { margin-bottom: 14px; }
  #scene-text em { color: var(--bone); font-style: italic; }
  #scene-text .ominous { color: var(--crimson); font-style: italic; }
  #scene-text .whisper { color: var(--ash); font-size: 0.88em; font-style: italic; }

  #choices { display: flex; flex-direction: column; gap: 10px; }

  .choice-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--parchment);
    font-family: var(--serif);
    font-size: 0.97rem;
    padding: 14px 20px;
    text-align: left;
    cursor: pointer;
    border-radius: 4px;
    position: relative;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    line-height: 1.4;
  }
  .choice-btn::before {
    content: '›';
    position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
    color: var(--crimson); opacity: 0; transition: opacity 0.2s;
    font-size: 1.2rem;
  }
  .choice-btn:hover {
    border-color: var(--crimson);
    color: var(--bone);
    background: #1a0a0a;
    padding-left: 28px;
  }
  .choice-btn:hover::before { opacity: 1; }
  .choice-btn:active { background: #200a0a; }

  #history-nav {
    margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  #history-nav .nav-label {
    font-family: var(--mono); font-size: 0.68rem;
    color: var(--ash); letter-spacing: 0.2em; text-transform: uppercase;
  }
  .hist-btn {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--ash); font-family: var(--mono); font-size: 0.7rem;
    padding: 4px 10px; border-radius: 3px; cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .hist-btn:hover { border-color: var(--teal); color: var(--teal-bright); }
  .hist-btn.current { border-color: var(--crimson); color: var(--crimson); }

  #achievements-panel {
    margin-top: 20px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 20px 24px;
  }
  #achievements-panel h3 {
    font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--ash); margin-bottom: 14px;
  }
  #achievements-grid {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .ach-badge {
    background: var(--deep); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 12px;
    font-size: 0.78rem; font-family: var(--mono);
    color: var(--ash); display: flex; align-items: center; gap: 6px;
    transition: border-color 0.3s;
    position: relative;
    cursor: default;
  }
  .ach-badge.unlocked {
    border-color: var(--teal); color: var(--teal-bright);
    text-shadow: 0 0 8px var(--teal);
  }
  /* Locked badges show question marks and no tooltip */
  .ach-badge.locked .ach-icon { filter: grayscale(1); opacity: 0.3; }
  .ach-badge.locked .ach-label { color: var(--border); }
  .ach-badge .ach-icon { font-size: 1rem; }
  /* Tooltip only shows for UNLOCKED badges */
  .ach-badge .ach-tip {
    display: none; position: absolute; bottom: calc(100% + 6px); left: 0;
    background: var(--deep); border: 1px solid var(--teal);
    padding: 6px 10px; white-space: nowrap; font-size: 0.7rem;
    color: var(--bone); z-index: 10; border-radius: 3px;
    pointer-events: none;
  }
  .ach-badge.unlocked:hover .ach-tip { display: block; }

  #toast {
    position: fixed; bottom: 30px; right: 30px;
    background: var(--panel); border: 1px solid var(--teal);
    border-radius: 6px; padding: 14px 20px;
    font-family: var(--mono); font-size: 0.8rem;
    color: var(--teal-bright); max-width: 300px;
    transform: translateY(20px); opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    z-index: 100; pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast .toast-title { color: var(--bone); font-size: 0.7rem; margin-bottom: 4px; letter-spacing: 0.15em; }

  /* ── DEATH SCREEN ── */
  #death-screen {
    display: none; position: fixed; inset: 0;
    background: #000000ee; z-index: 200;
    align-items: center; justify-content: center;
    flex-direction: column; text-align: center;
  }
  #death-screen.active { display: flex; }
  #death-content {
    max-width: 500px; padding: 40px;
    animation: deathFade 0.8s ease;
  }
  #death-tag {
    font-family: var(--mono); color: var(--crimson);
    letter-spacing: 0.5em; font-size: 0.75rem;
    text-transform: uppercase; margin-bottom: 20px;
    animation: pulse-crimson 2s infinite;
  }
  #death-title {
    font-size: 2rem; color: var(--bone);
    font-style: italic; margin-bottom: 16px;
  }
  #death-msg {
    color: var(--parchment); font-size: 0.95rem;
    line-height: 1.8; margin-bottom: 30px;
  }
  #death-stats {
    font-family: var(--mono); font-size: 0.75rem;
    color: var(--ash); margin-bottom: 30px;
  }
  #death-restart {
    background: var(--crimson); color: var(--bone);
    border: none; padding: 14px 36px;
    font-family: var(--mono); font-size: 0.85rem;
    letter-spacing: 0.2em; text-transform: uppercase;
    border-radius: 4px; cursor: pointer;
    transition: background 0.2s;
    box-shadow: 0 0 30px var(--crimson-glow);
  }
  #death-restart:hover { background: var(--crimson-bright); }

  #minigame-overlay {
    position: fixed; inset: 0; background: #000000ee;
    display: none; align-items: center; justify-content: center;
    z-index: 50;
  }
  #minigame-overlay.active { display: flex; }
  #minigame-box {
    background: var(--panel); border: 1px solid var(--crimson);
    border-radius: 8px; padding: 36px 40px;
    max-width: 580px; width: 95%;
    box-shadow: 0 0 60px var(--crimson-glow);
  }
  #minigame-box h2 {
    font-family: var(--mono); color: var(--crimson);
    letter-spacing: 0.25em; font-size: 0.85rem;
    text-transform: uppercase; margin-bottom: 6px;
  }
  #minigame-box .mg-title {
    font-size: 1.4rem; color: var(--bone);
    margin-bottom: 14px; font-style: italic;
  }
  #minigame-box .mg-desc {
    color: var(--parchment); font-size: 0.92rem;
    line-height: 1.7; margin-bottom: 20px;
  }
  #minigame-content { margin-bottom: 20px; }

  /* ── TIMER BAR ── */
  .mg-timer-wrap {
    margin-bottom: 14px;
  }
  .mg-timer-label {
    font-family: var(--mono); font-size: 0.68rem;
    color: var(--ash); letter-spacing: 0.2em;
    text-transform: uppercase; margin-bottom: 4px;
    display: flex; justify-content: space-between;
  }
  .mg-timer-bg { background: var(--border); border-radius: 2px; height: 5px; }
  .mg-timer-bar {
    height: 5px; border-radius: 2px;
    background: var(--teal-bright);
    transition: background 0.3s;
  }
  .mg-attempts-left {
    font-family: var(--mono); font-size: 0.72rem;
    color: var(--ash); margin-bottom: 10px;
    display: flex; gap: 6px; align-items: center;
  }
  .life { color: var(--crimson); font-size: 1rem; }
  .life.dead { color: var(--border); }

  /* Code Lock */
  .code-lock { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .code-digit {
    width: 54px; height: 70px;
    background: var(--deep); border: 2px solid var(--border);
    border-radius: 4px; font-family: var(--mono);
    font-size: 2rem; color: var(--bone); text-align: center;
    cursor: pointer; transition: border-color 0.2s;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  .code-digit:hover { border-color: var(--crimson); }
  .code-digit.correct { border-color: var(--teal); color: var(--teal-bright); }
  .code-digit.wrong { border-color: var(--crimson); animation: shake 0.3s; }
  .code-hint { text-align: center; font-family: var(--mono); font-size: 0.78rem;
    color: var(--ash); margin-bottom: 12px; }

  /* Memory Game */
  .memory-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px; max-width: 320px; margin: 0 auto;
  }
  .mem-card {
    aspect-ratio: 1; background: var(--deep);
    border: 2px solid var(--border); border-radius: 4px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 1.6rem;
    transition: transform 0.2s, border-color 0.2s;
    user-select: none;
  }
  .mem-card:hover:not(.flipped):not(.matched) { border-color: var(--teal); }
  .mem-card.flipped, .mem-card.matched { background: #1a2a2a; }
  .mem-card.matched { border-color: var(--teal); }
  .mem-card .card-face { display: none; }
  .mem-card.flipped .card-face, .mem-card.matched .card-face { display: block; }

  /* Simon / Sequence */
  .simon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 260px; margin: 0 auto; }
  .simon-btn {
    aspect-ratio: 1; border-radius: 8px; border: 2px solid transparent;
    cursor: pointer; transition: filter 0.1s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; filter: brightness(0.5);
  }
  .simon-btn.active { filter: brightness(1.5); transform: scale(0.96); }
  .simon-btn:hover { filter: brightness(0.8); }

  /* Riddle */
  .riddle-input {
    background: var(--deep); border: 2px solid var(--border);
    border-radius: 4px; padding: 10px 14px;
    font-family: var(--mono); font-size: 1rem;
    color: var(--bone); width: 100%;
    outline: none; transition: border-color 0.2s;
  }
  .riddle-input:focus { border-color: var(--teal); }

  /* Stealth Timer */
  .stealth-bar-bg { background: var(--border); height: 12px; border-radius: 6px; overflow: hidden; }
  .stealth-bar { height: 100%; background: var(--teal-bright);
    border-radius: 6px; transition: width 0.1s linear, background 0.3s; }
  .stealth-zones { display: flex; gap: 10px; justify-content: center;
    margin-top: 12px; flex-wrap: wrap; }
  .stealth-zone {
    background: var(--deep); border: 2px solid var(--border);
    border-radius: 4px; padding: 8px 18px;
    font-family: var(--mono); font-size: 0.9rem;
    color: var(--parchment); cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .stealth-zone:hover { border-color: var(--crimson); background: #1a0a0a; }

  /* Cipher */
  .cipher-table { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-bottom: 12px; }
  .cipher-pair { font-family: var(--mono); font-size: 0.75rem; color: var(--ash);
    background: var(--deep); border: 1px solid var(--border);
    padding: 3px 7px; border-radius: 3px; }

  .mg-btn {
    background: var(--crimson); color: var(--bone);
    border: none; padding: 10px 24px; border-radius: 4px;
    font-family: var(--mono); font-size: 0.82rem;
    letter-spacing: 0.15em; cursor: pointer;
    transition: background 0.2s;
    text-transform: uppercase;
  }
  .mg-btn:hover { background: var(--crimson-bright); }
  .mg-btn.teal { background: var(--teal); }
  .mg-btn.teal:hover { background: var(--teal-bright); }
  .mg-result { margin-top: 14px; font-family: var(--mono); font-size: 0.85rem; }
  .mg-result.success { color: var(--teal-bright); }
  .mg-result.fail { color: var(--crimson); }

  #ending-screen {
    display: none; text-align: center; padding: 40px 20px;
  }
  #ending-screen.active { display: block; }
  #ending-tag {
    font-family: var(--mono); font-size: 0.7rem;
    letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--crimson); margin-bottom: 16px;
  }
  #ending-title {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: var(--bone); font-style: italic;
    margin-bottom: 20px; line-height: 1.3;
  }
  #ending-text {
    font-size: 1rem; line-height: 1.85;
    color: var(--parchment); max-width: 600px;
    margin: 0 auto 30px;
  }
  #ending-stats {
    display: flex; gap: 20px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 30px;
  }
  .ending-stat {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 4px; padding: 12px 20px;
    font-family: var(--mono); font-size: 0.78rem;
    color: var(--ash);
  }
  .ending-stat span { display: block; color: var(--bone); font-size: 1.1rem; margin-top: 4px; }
  #restart-btn {
    background: var(--crimson); color: var(--bone);
    border: none; padding: 14px 32px;
    font-family: var(--mono); font-size: 0.85rem;
    letter-spacing: 0.2em; text-transform: uppercase;
    border-radius: 4px; cursor: pointer;
    transition: background 0.2s;
  }
  #restart-btn:hover { background: var(--crimson-bright); }

  .fade-in { animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  @keyframes pulse-crimson {
    0%,100% { box-shadow: none; opacity: 1; }
    50% { box-shadow: 0 0 30px var(--crimson-glow); opacity: 0.7; }
  }
  @keyframes deathFade {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes bloodDrip {
    0% { transform: translateY(-100%); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0.6; }
  }
  .blood-drip {
    position: fixed; top: 0; width: 3px;
    background: linear-gradient(to bottom, transparent, var(--crimson), #4a0000);
    border-radius: 0 0 50% 50%;
    animation: bloodDrip 2s ease-in forwards;
    pointer-events: none; z-index: 199;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--crimson); }

  @media (max-width: 600px) {
    #game-panel { padding: 20px 16px; }
    #game-header h1 { font-size: 1.8rem; }
    #minigame-box { padding: 24px 18px; }
  }
</style>
</head>
<body>
<div id="app">
  <header id="game-header">
    <h1>The Hollow House</h1>
    <div class="subtitle">A Dark Journey — Choose Wisely</div>
  </header>

  <div id="hud">
    <div class="hud-pill">Chapter <span class="val" id="hud-chapter">–</span></div>
    <div class="hud-pill">Sanity <span class="val" id="hud-sanity">100</span>%</div>
    <div class="hud-pill hud-pill--bar" id="sanity-bar-wrap">
      <div id="sanity-bar-bg"><div id="sanity-bar" style="width:100%"></div></div>
    </div>
    <div class="hud-pill">Decisions <span class="val" id="hud-decisions">0</span></div>
    <div class="hud-pill">🏆 <span class="val" id="hud-ach">0</span></div>
    <div class="hud-pill" id="music-pill" style="cursor:pointer" title="Toggle ambient music" onclick="toggleMusic()">
      ♪ <span class="val" id="music-label">Music On</span>
    </div>
  </div>

  <div id="game-panel">
    <div id="scene-chapter"></div>
    <div id="scene-title"></div>
    <div id="scene-text"></div>
    <div id="choices"></div>
  </div>

  <div id="history-nav">
    <span class="nav-label">History:</span>
    <div id="history-btns"></div>
  </div>

  <div id="achievements-panel">
    <h3>Achievements</h3>
    <div id="achievements-grid"></div>
  </div>

  <div id="ending-screen">
    <div id="ending-tag">ENDING</div>
    <div id="ending-title"></div>
    <div id="ending-text"></div>
    <div id="ending-stats"></div>
    <button id="restart-btn" onclick="restartGame()">Begin Again</button>
  </div>
</div>

<div id="toast"><div class="toast-title">ACHIEVEMENT UNLOCKED</div><div id="toast-msg"></div></div>

<div id="minigame-overlay">
  <div id="minigame-box">
    <h2 id="mg-label">Mini-Game</h2>
    <div class="mg-title" id="mg-title"></div>
    <div class="mg-desc" id="mg-desc"></div>
    <div id="minigame-content"></div>
    <div id="mg-result-area"></div>
  </div>
</div>

<!-- DEATH SCREEN -->
<div id="death-screen">
  <div id="death-content">
    <div id="death-tag">✦ YOU HAVE PERISHED ✦</div>
    <div id="death-title">The House Claimed You</div>
    <div id="death-msg"></div>
    <div id="death-stats"></div>
    <button id="death-restart" onclick="triggerRestart()">⟳ Begin Again From The Start</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// SOUND ENGINE
// ═══════════════════════════════════════════════════════════════
const SOUND = (() => {
  let ctx = null;
  let masterGain = null;
  let musicGain = null;
  let sfxGain = null;
  let musicNodes = [];
  let currentMood = null;
  let musicEnabled = true;
  const MUSIC_VOL = 0.14;
  const SFX_VOL = 0.4;

  function ensureCtx() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain(); masterGain.gain.value = 1;
    masterGain.connect(ctx.destination);
    musicGain = ctx.createGain(); musicGain.gain.value = MUSIC_VOL;
    musicGain.connect(masterGain);
    sfxGain = ctx.createGain(); sfxGain.gain.value = SFX_VOL;
    sfxGain.connect(masterGain);
  }

  function resume() { ctx && ctx.state === 'suspended' && ctx.resume(); }

  // ── MUSIC MOODS ──
  const MOODS = {
    calm(ctx, g) {
      const nodes = [];
      [55, 82.4, 110].forEach((f, i) => {
        const o = ctx.createOscillator(), og = ctx.createGain();
        const lfo = ctx.createOscillator(), lg = ctx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        lfo.type = 'sine'; lfo.frequency.value = 0.04 + i * 0.01;
        lg.gain.value = f * 0.004;
        og.gain.setValueAtTime(0, ctx.currentTime);
        og.gain.linearRampToValueAtTime(0.06 - i * 0.015, ctx.currentTime + 3);
        lfo.connect(lg); lg.connect(o.frequency);
        o.connect(og); og.connect(g);
        o.start(); lfo.start(); nodes.push(o, lfo, og, lg);
      });
      return nodes;
    },
    tense(ctx, g) {
      const nodes = [];
      const drone = ctx.createOscillator(), dg = ctx.createGain();
      drone.type = 'sawtooth'; drone.frequency.value = 36.7;
      dg.gain.setValueAtTime(0, ctx.currentTime);
      dg.gain.linearRampToValueAtTime(0.04, ctx.currentTime + 2);
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 180;
      drone.connect(lp); lp.connect(dg); dg.connect(g); drone.start();
      nodes.push(drone, dg, lp);
      const mid = ctx.createOscillator(), mg2 = ctx.createGain();
      const trem = ctx.createOscillator(), tg = ctx.createGain();
      mid.type = 'triangle'; mid.frequency.value = 110;
      trem.type = 'sine'; trem.frequency.value = 3.5;
      tg.gain.value = 0.03; mg2.gain.value = 0.04;
      trem.connect(tg); tg.connect(mg2.gain);
      mid.connect(mg2); mg2.connect(g); mid.start(); trem.start();
      nodes.push(mid, mg2, trem, tg);
      return nodes;
    },
    horror(ctx, g) {
      const nodes = [];
      [29.1, 31.5, 34.6].forEach(f => {
        const o = ctx.createOscillator(), og = ctx.createGain();
        o.type = 'sawtooth'; o.frequency.value = f;
        og.gain.setValueAtTime(0, ctx.currentTime);
        og.gain.linearRampToValueAtTime(0.055, ctx.currentTime + 1.5);
        o.connect(og); og.connect(g); o.start(); nodes.push(o, og);
      });
      [220, 233, 246].forEach((f, i) => {
        const o = ctx.createOscillator(), og = ctx.createGain();
        const lfo = ctx.createOscillator(), lg = ctx.createGain();
        o.type = 'triangle'; o.frequency.value = f;
        lfo.type = 'sine'; lfo.frequency.value = 0.12 + i * 0.03;
        lg.gain.value = 3; og.gain.value = 0.018;
        lfo.connect(lg); lg.connect(o.frequency);
        o.connect(og); og.connect(g); o.start(); lfo.start();
        nodes.push(o, og, lfo, lg);
      });
      return nodes;
    },
    cellar(ctx, g) {
      const nodes = [];
      [18.3, 24.5, 29.1].forEach(f => {
        const o = ctx.createOscillator(), og = ctx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        og.gain.setValueAtTime(0, ctx.currentTime); og.gain.linearRampToValueAtTime(0.09, ctx.currentTime + 3);
        o.connect(og); og.connect(g); o.start(); nodes.push(o, og);
      });
      const pulse = ctx.createOscillator(), pg = ctx.createGain();
      pulse.type = 'sine'; pulse.frequency.value = 0.25; pg.gain.value = 0.03;
      pulse.connect(pg); pg.connect(g.gain); pulse.start(); nodes.push(pulse, pg);
      return nodes;
    },
    resolution(ctx, g) {
      const nodes = [];
      const pentatonic = [261.6, 293.7, 329.6, 392, 440, 523.3];
      pentatonic.forEach((f, i) => {
        const o = ctx.createOscillator(), og = ctx.createGain();
        o.type = 'sine';
        const d = ctx.currentTime + 0.5 + i * 1.4;
        o.frequency.value = f;
        og.gain.setValueAtTime(0, d);
        og.gain.linearRampToValueAtTime(0.07, d + 0.05);
        og.gain.exponentialRampToValueAtTime(0.001, d + 3);
        o.connect(og); og.connect(g); o.start(d); o.stop(d + 3.1); nodes.push(o, og);
      });
      return nodes;
    },
    minigame(ctx, g) {
      const nodes = [];
      const b = ctx.createOscillator(), bg = ctx.createGain();
      b.type = 'square'; b.frequency.value = 55;
      bg.gain.setValueAtTime(0, ctx.currentTime); bg.gain.linearRampToValueAtTime(0.025, ctx.currentTime + 0.5);
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 120;
      b.connect(lp); lp.connect(bg); bg.connect(g); b.start(); nodes.push(b, bg, lp);
      const hi = ctx.createOscillator(), hg = ctx.createGain();
      hi.type = 'sine'; hi.frequency.value = 660;
      const hiLFO = ctx.createOscillator(), hlg = ctx.createGain();
      hiLFO.type = 'sine'; hiLFO.frequency.value = 6; hlg.gain.value = 20;
      hg.gain.setValueAtTime(0, ctx.currentTime); hg.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 1);
      hiLFO.connect(hlg); hlg.connect(hi.frequency);
      hi.connect(hg); hg.connect(g); hi.start(); hiLFO.start(); nodes.push(hi, hg, hiLFO, hlg);
      return nodes;
    }
  };

  function moodForScene(id) {
    if (!id) return 'calm';
    if (id.startsWith('ending_')) return 'resolution';
    const s = id.toLowerCase();
    if (s.includes('cellar') || s.includes('basement') || s.includes('c4_')) return 'cellar';
    if (s.includes('creature') || s.includes('red_door') || s.includes('mirror_step') || s.includes('seventh') || s.includes('call_out')) return 'horror';
    if (s.includes('c2_') || s.includes('c3_') || s.includes('room7') || s.includes('keeper') || s.includes('hide')) return 'tense';
    return 'calm';
  }

  function stopMusic(fadeSecs = 1.5) {
    if (!musicGain) return;
    musicGain.gain.cancelScheduledValues(ctx.currentTime);
    musicGain.gain.setValueAtTime(musicGain.gain.value, ctx.currentTime);
    musicGain.gain.linearRampToValueAtTime(0, ctx.currentTime + fadeSecs);
    const old = musicNodes;
    setTimeout(() => {
      old.forEach(n => { try { n.stop && n.stop(); n.disconnect && n.disconnect(); } catch(e){} });
    }, (fadeSecs + 0.2) * 1000);
    musicNodes = [];
    setTimeout(() => {
      if (musicGain) { musicGain.gain.setValueAtTime(MUSIC_VOL, ctx.currentTime); }
    }, (fadeSecs + 0.3) * 1000);
  }

  function playMood(mood) {
    ensureCtx(); resume();
    if (!musicEnabled) return;
    if (mood === currentMood) return;
    currentMood = mood;
    stopMusic(1.8);
    const builder = MOODS[mood] || MOODS.calm;
    setTimeout(() => {
      if (!musicEnabled) return;
      musicNodes = builder(ctx, musicGain);
    }, 200);
  }

  // ── SFX ──
  function playClick() {
    ensureCtx(); resume();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(220, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.08);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    o.connect(g); g.connect(sfxGain); o.start(); o.stop(ctx.currentTime + 0.15);
  }

  function playDoor() {
    ensureCtx(); resume();
    // Creak sound
    const bufSize = ctx.sampleRate * 0.6;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.4)) * 0.8;
    }
    const ns = ctx.createBufferSource(), g = ctx.createGain();
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 300; bp.Q.value = 2;
    ns.buffer = buf; g.gain.value = 0.5;
    ns.connect(bp); bp.connect(g); g.connect(sfxGain); ns.start();
  }

  function playWhisper() {
    ensureCtx(); resume();
    const bufSize = ctx.sampleRate * 1;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.sin(i / bufSize * Math.PI) * 0.4;
    }
    const ns = ctx.createBufferSource(), g = ctx.createGain();
    const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1500;
    const rev = ctx.createConvolver();
    ns.buffer = buf; g.gain.value = 0.35;
    ns.connect(hp); hp.connect(g); g.connect(sfxGain); ns.start();
  }

  function playAchievement() {
    ensureCtx(); resume();
    const freqs = [523.3, 659.3, 783.99, 1046.5];
    freqs.forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      const t = ctx.currentTime + i * 0.12;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.2, t + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t + 0.55);
    });
  }

  function playDeath() {
    ensureCtx(); resume();
    // Descending doom chord
    stopMusic(0.3);
    currentMood = null;
    [55, 58, 61, 65].forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(f * 2, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(f * 0.5, ctx.currentTime + 3);
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.15 - i * 0.02, ctx.currentTime + 0.2);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3.5);
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 400 - i * 50;
      o.connect(lp); lp.connect(g); g.connect(sfxGain); o.start(); o.stop(ctx.currentTime + 3.6);
    });
    // Heartbeat stops
    setTimeout(() => {
      [0, 200].forEach(delay => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = 60;
        const t = ctx.currentTime + delay / 1000;
        g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.4, t + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t + 0.35);
      });
    }, 500);
  }

  function playSuccess() {
    ensureCtx(); resume();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(440, ctx.currentTime);
    o.frequency.setValueAtTime(660, ctx.currentTime + 0.1);
    o.frequency.setValueAtTime(880, ctx.currentTime + 0.2);
    g.gain.setValueAtTime(0.25, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    o.connect(g); g.connect(sfxGain); o.start(); o.stop(ctx.currentTime + 0.65);
  }

  function playFail() {
    ensureCtx(); resume();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(200, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.3);
    g.gain.setValueAtTime(0.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 500;
    o.connect(lp); lp.connect(g); g.connect(sfxGain); o.start(); o.stop(ctx.currentTime + 0.45);
  }

  function playHeartbeat() {
    ensureCtx(); resume();
    [0, 0.25].forEach(delay => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = 50;
      const t = ctx.currentTime + delay;
      g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.3, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t + 0.3);
    });
  }

  function playTimerTick() {
    ensureCtx(); resume();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'square'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 2000;
    o.connect(lp); lp.connect(g); g.connect(sfxGain); o.start(); o.stop(ctx.currentTime + 0.07);
  }

  return {
    setScene(id) { playMood(moodForScene(id)); },
    playMinigame() { playMood('minigame'); },
    endMinigame(id) { currentMood = null; playMood(moodForScene(id)); },
    sfx: { click: playClick, door: playDoor, whisper: playWhisper, achievement: playAchievement,
            death: playDeath, success: playSuccess, fail: playFail, heartbeat: playHeartbeat,
            tick: playTimerTick },
    toggle() {
    ensureCtx(); resume();
    musicEnabled = !musicEnabled;
    if (!musicEnabled) { stopMusic(0.5); currentMood = null; }
    // CHANGED: replaced 'this.setScene' with 'SOUND.setScene' 
    else { currentMood = null; SOUND.setScene(typeof STATE !== 'undefined' && STATE.current ? STATE.current : 'start'); }
    return musicEnabled;
    },
    init() { ensureCtx(); resume(); }
  };
})();

c1_fight_keeper: {
  chapter: 'Chapter I — The Awakening',
  title: 'Fury in the Dark',
  text: `<p>You shove the cabinet with everything you have. It crashes into the groundskeeper and he stumbles back with a sound like breaking kindling. You vault over the debris and sprint for the servants corridor.</p>
<p>Behind you, impossibly, he laughs.</p>
<p>"Run, little dreamer. You always do."</p>`,
  flags: { 'fought_keeper': true, fled_initial: true, flee_count: 1 },
  choices: [

c1_beg_keeper: {
  chapter: 'Chapter I — The Awakening',
  title: 'Something Like Mercy',
  text: `<p>"Please," you say. "I don't know what this place is. I don't know why I'm here."</p>
<p>The figure tilts his head. After a long moment, he lowers the iron hook and reaches into his coat, pulling out a small iron key. Tosses it to you.</p>
<p>"The library. Second floor, east wing. The answers are there. Go, before the house wakes properly."</p>`,
  flags: { 'keeper_friendly': true, 'library_key': true },
  choices: [
    { text: 'Thank him and move to the servants corridor.', next: 'c1_servant_corridor', sanity: 5 },
    { text: 'Ask him what he means by "Thorne\'s."', next: 'c1_ask_thorne', sanity: 0 }
  ]
},
c1_ask_thorne: {
  chapter: 'Chapter I — The Awakening',
  title: 'The Name',
  text: `<p>"Who is Thorne?" you ask.</p>
<p>The groundskeeper is quiet for a long moment. "Was," he corrects. "Who <em>was</em> Thorne. He built this house. Over forty years. Brick by brick, room by room. And when it was finished, he decided it needed one final thing."</p>
<p>He does not elaborate. "Go to the library. Some knowledge you must find yourself."</p>`,
  flags: { 'knows_thorne': true },
  choices: [
    { text: 'Heed his advice. Go to the servants corridor.', next: 'c1_servant_corridor', sanity: 0 }
  ]
},
c1_key_note: {
  chapter: 'Chapter I — The Awakening',
  title: 'Brass and Paper',
  text: `<p>You pick up the key — heavy, old, engraved with the letter <em>T</em>. The note beside it is written in cramped, frantic handwriting:</p>
<p class="whisper"><em>"If you're reading this you've survived the first night. Don't trust the light that moves on its own. Don't open the red door. The cellar knows your name. Find the library — the truth is in the third case from the left, bottom shelf. — E"</em></p>
<p>Who is E? You pocket the key and note. Someone has been here before you. Recently — the ink is barely dry.</p>`,
  flags: { 'has_key': true, 'read_note': true, 'clue_1': true },
  choices: [

},

  text: `<p>You press your ear to the cold red wood. Then — a voice, right beside your ear: <p class="ominous">"We know your face. We know your blood. We've been growing your room for thirty years."</p><p>The door bulges slightly outward.</p>`,

c1_north_door: {
  chapter: 'Chapter I — The Awakening', title: 'The Foyer',
  text: `<p>The oak door opens with effort, revealing a grand foyer — a sweeping staircase splits left and right at a landing above. A chandelier holds a hundred dead candles.</p>
<p>Three things catch your attention: a mirror whose reflection shows the room <em>as it was</em>; a door to the right marked <strong>STUDY</strong>; and the stairs themselves.</p>`,

c1_mirror: {
  chapter: 'Chapter I — The Awakening', title: 'The Living Past',
  text: `<p>Your reflection is wrong — it shows you wearing different clothing, standing in a room that glows with warmth. The mirror-you notices <em>you</em>. It steps forward and mouths something.</p>
<p>You read its lips: <em>"Don't let them take the third thing."</em></p>
<p>The mirror clouds with black smoke. When it clears it shows only you, pale and wide-eyed.</p>`,

c1_study: {
  chapter: 'Chapter I — The Awakening', title: 'The Study',
  text: `<p>The study is lined floor to ceiling with books. A great desk dominates the center, covered in papers, bottles of dried ink, and a half-eaten meal — decades old. Someone left in a hurry.</p>
<p>A title page catches your eye: <strong><em>A History of Thorne House</em></strong> by Edmund Voss. And below the desk, tied to the chair leg: a leather-bound journal.</p>`,

},
c1_study_history: {
  chapter: 'Chapter I — The Awakening', title: 'What Was Written',
  text: `<p>You learn: <em>Thorne House</em> was built in 1887 by <strong>Aldous Thorne</strong>, a collector of occult objects and practitioner of "sympathetic architecture." The history ends abruptly mid-sentence: <em>"What Thorne ultimately built the house to contain has never been confirmed, but the seventeen disappearances between 1901 and 1923 suggest..."</em></p>
<p>The rest of the page has been cut out. Deliberately.</p>`,

c1_study_journal: {
  chapter: 'Chapter I — The Awakening', title: 'The Journal of E',
  text: `<p class="whisper"><em>"Day 1 — Have entered the house successfully. Day 4 — Found the ritual chamber. Thorne didn't build this house to contain something. He built it to SUMMON it. Day 9 — It knows I'm here. Day 12 — I've found a way to end this. I need three keys. The Brass key (found). The Bone key (cellar). The Glass key (attic). If the lock is opened in reverse order, the house unmakes itself. Day 14—"</em></p>
<p>The entry ends there. The remaining pages are wet with something dark.</p>`,

c1_study_drawers: {
  chapter: 'Chapter I — The Awakening', title: 'Secrets in Wood',
  text: `<p>The bottom drawer reveals: a folded map of the house (three floors, plus cellar and attic), a small vial of clear liquid labeled <em>"For the eyes — dilute with tears"</em>, and a playing card — the King of Spades — with a phone number written in fresh ink.</p>
<p>No phone exists here. No signal reaches here. But you keep the card. And the map. And the vial.</p>`,
  flags: { 'has_map': true, 'has_vial': true, 'has_card': true, 'clue_5': true },

},
c1_vial_use: {
  chapter: 'Chapter I — The Awakening', title: 'Vision',
  text: `<p>It burns. When you open your eyes the house looks different — overlaid on the ruin is a ghostly image as it <em>was</em>: warm, lit, populated by translucent figures. And in the center, standing utterly still, a tall figure in a black coat who is not translucent.</p>
<p>He turns and looks directly at you. He smiles. He points at your chest. The vision fades.</p>`,

},
c1_servant_corridor: {
  chapter: 'Chapter I — The Awakening', title: 'Servants and Shadows',
  text: `<p>The corridor is low-ceilinged and smells of grease and old cooking. It runs parallel to the main hall, with narrow doorways leading to a larder, a linen room, and a staircase going both up and down.</p>
<p>On the wall, someone has scratched a message: <p class="whisper"><em>"COUNT THE DOORS. SKIP THE SEVENTH."</em></p>`,

  ]
},
c1_linen_room: {
  chapter: 'Chapter I — The Awakening', title: 'The Linen Room',
  text: `<p>Shelves of rotted cloth. And on the floor, curled in the corner, a small figure in a white dress: a porcelain doll, old and cracked, whose glass eyes track you as you enter.</p>
<p>Its mouth is slightly open. You realize — with a chill — that it's <em>breathing</em>. A tiny, barely-audible wheeze. Stitched into the doll's chest is a key.</p>`,

},
c1_doll_speak: {
  chapter: 'Chapter I — The Awakening', title: 'What Dolls Know',
  text: `<p>Its head turns. Slowly. When it speaks, its voice is a child's but the cadence is ancient:</p>
<p class="ominous">"We are all here because of the bargain. You most of all. You are the third thing. You have always been the third thing. He has been waiting since before you were born."</p>
<p>Its head turns back to face the wall. It stops breathing. A wax doll, nothing more.</p>`,
  sanityDelta: -10, flags: { 'doll_spoke': true, 'clue_third_thing': true },

c1_antechamber: {
  chapter: 'Chapter I — The Awakening', title: 'The Antechamber',
  text: `<p>The antechamber is circular, with seven doors set into the walls at equal intervals. Each door is identical — except that the seventh has no handle, its surface covered in scratched text too small to read.</p>
<p>Through one door you can hear music — a music box melody, thin and melancholy.</p>`,

c1_seventh_door: {
  chapter: 'Chapter I — The Awakening', title: 'A Thousand Names',
  text: `<p>The text is names — hundreds of names, carved into the wood. Some names are repeated. Your eyes scan… and then your blood stops.</p>

c1_touch_name: {
  chapter: 'Chapter I — The Awakening', title: 'Recognition',
  text: `<p>The moment your finger touches the carving, a shock goes through you — memories flash: a different life, a different you, standing in this house before it became ruins, shaking hands with a tall man whose face you cannot quite see.</p>

  title: 'The Second Floor Landing',
  text: `<p>The upper landing stretches before you — a long corridor lined with doors, each numbered with a brass plate. The carpets here are intact but deeply stained. Gas-light sconces give off a faint, sickly glow.</p>

<p>The paper reads: <em>"I am Aldous Thorne. I am keeping myself here because I cannot be trusted elsewhere. The thing I have invited into this house occupies my body when I sleep. In my waking hours I remain restrained. I beg whoever finds this: do not free the house. It must be contained HERE, within these walls, or it will spread."</em></p>`,

  chapter: 'Chapter II — The Upper Floors',
  title: 'The Library',
  text: `<p>The library is two stories high and runs the entire east wing — dark walnut shelves packed with thousands of volumes. You find the third case from the left, bottom shelf, as the note instructed. One book stands out:</p>
<p><em><strong>"The Thorne Ritual: A Complete Account"</strong></em></p>
<p>And behind it, wedged into the shelf: a photograph. Around the woman's neck, glinting: a <strong>Glass Key</strong>.</p>`,
  flags: { 'found_library': true },
  minigame: 'memory',
  choices: []
},
c2_library_after: {
  chapter: 'Chapter II — The Upper Floors', title: 'What The Book Reveals',
  text: `<p>Aldous Thorne sought to permanently bind a being he called <em>the Hollow</em> to the physical world using three anchors — Brass, Bone, and Glass souls — represented by three keys. If the ritual is completed, the Hollow gains permanent physical form.</p>
<p>If the three keys are used <em>against the ritual</em> — placed in the altar in reverse order — the Hollow is expelled and the house collapses.</p>
<p>E knew this. E came here to reverse the ritual. Where is E now?</p>`,
  flags: { 'knows_ritual': true, 'clue_ritual': true, 'all_clues_check': true },
  choices: [
    { text: 'Go down to the cellar. Find the Bone Key.', next: 'c3_cellar', sanity: 0 },
    { text: 'Go up to the attic. Find the Glass Key.', next: 'c3_intro', sanity: 0 },
    { text: 'Search the library for more information about E.', next: 'c2_library_e', sanity: 0 }
  ]
},
c2_library_e: {

  text: `<p>A hidden compartment behind the ritual book contains a woman's locket. Inside: a portrait and a small card reading <em>Eleanor Voss, Paranormal Investigator</em>.</p>
<p>Eleanor came here looking for answers. The locket is cold and still, but as you hold it, you feel a faint heartbeat through the metal. She might still be alive. Somewhere in this house.</p>`,
  flags: { 'knows_eleanor': true, 'eleanor_alive_hint': true, 'clue_e_found': true },
  choices: [
    { text: 'Find Eleanor. Search the attic.', next: 'c3_intro', sanity: 0 },

c2_cellar_direct: {
  chapter: 'Chapter II — The Upper Floors', title: 'Pulling Toward the Deep',

c3_intro: {
  chapter: 'Chapter III — The Attic',
  title: 'Above the House',
  text: `<p>The attic is vast, low-ceilinged, lit by moonlight through cracked skylights. Your footprints are not the first ones here. Two sets of tracks — one coming in, one going toward the far end — and both sets simply <em>stop</em>. In the middle of the floor.</p>
<p>At the far end: a wardrobe. A locked chest. And a window, cracked open, through which cold wind carries the sound of something moving on the roof.</p>`,
  chapter_num: 3,
  choices: [

  ]
},
c3_footprints: {
  chapter: 'Chapter III — The Attic', title: 'Where They Ended',
  text: `<p>The footprints simply cease. You press your hand to the floor where they end. It's warm. And you hear breathing — from <em>below the floorboards</em>, at this exact spot.</p>

  sanityDelta: -15, flags: { 'found_attic_void': true },
  choices: [

c3_under_floor: {
  chapter: 'Chapter III — The Attic', title: 'Between the Floors',
  text: `<p>Inside the shallow space beneath the board, pressed flat and still, is a woman. Alive. Eyes wide, staring up at you.</p>
<p><em>Eleanor Voss</em>. She grabs your hand. Hard. "Don't make noise," she whispers. "It's on the roof. <em>Don't let it hear you find me.</em>"</p>`,
  flags: { 'found_eleanor': true, 'eleanor_alive': true },
  choices: [

},
c3_ask_eleanor: {
  chapter: 'Chapter III — The Attic', title: 'What Eleanor Knows',
  text: `<p>Eleanor touches the chain around her neck, then nods. She unhooks it and passes you the Glass Key — a delicate thing, faceted like crystal, heavy for its size.</p>
<p>"The Bone Key is in the creature's den," she mouths. "In the cellar. The ritual altar is in the sub-basement. Three keyholes. Right, center, left. That order. <em>Whatever you hear when you do it, don't stop.</em>"</p>`,
  flags: { 'has_glass_key': true, 'knows_altar': true, 'eleanor_briefed': true },
  choices: [

},
c3_eleanor_out: {
  chapter: 'Chapter III — The Attic', title: 'Rescued',
  text: `<p>You pull Eleanor free. She's thin and trembling, but her eyes are clear. She hands you the Glass Key without you asking.</p>
<p>"I've been here nine days," she says quietly. "I thought you weren't coming."</p>
<p>Above you, on the roof, something <em>heavy</em> moves. Then goes still.</p>`,

c3_wardrobe: {
  chapter: 'Chapter III — The Attic', title: 'The Wardrobe',
  text: `<p>Inside: Victorian clothing. And in the back — a mirror. This mirror, unlike the foyer's, shows the room correctly. But it shows it <em>empty</em>. You're not in the reflection. You wave. No response. You are not in this mirror.</p>`,

  chapter: 'Chapter III — The Attic', title: 'Through',
  text: `<p>Your hand passes through the glass. You step fully through. You are in the same attic — but it is 1901. A door in this version of the attic stands open. Beyond it: a pedestal, and on it, a key of pure glass.</p>`,

c3_mirror_key: {
  chapter: 'Chapter III — The Attic', title: 'Past Into Present',
  text: `<p>You take the Glass Key. Immediately, Aldous Thorne appears in the doorway — young and vital, eyes burning. "You can't take that. It isn't yours yet."</p>

c3_mirror_explore: {
  chapter: 'Chapter III — The Attic', title: 'The Past World',
  text: `<p>In the attic of 1901 you find a guest list for the evening's party below, with every name crossed out and replaced by the single word: <em>MATERIAL</em>.</p>

c3_chest: {
  chapter: 'Chapter III — The Attic',
  title: 'The Locked Chest',
  text: `<p>The chest is old and heavy, bound in iron, with a complex dial lock on the front. Scratched into the lid: <em>"Count the doors. Skip the seventh."</em></p>
<p>The same message from the servant's corridor. There are six doors in the antechamber (skipping the seventh). Six. But counting what, exactly?</p>`,

c3_chest_open: {
  chapter: 'Chapter III — The Attic', title: 'What Was Kept',
  text: `<p>The chest opens. Inside, nestled in velvet: an old journal, three photographs of people who each look vaguely like you, a box of matches, a small revolver with three bullets, and a folded architectural drawing labeled <em>"THE ALTAR — FINAL CONFIGURATION."</em></p>`,
  flags: { 'has_revolver': true, 'has_matches': true, 'has_altar_drawing': true, 'clue_chest': true },
  choices: [

},
c3_altar_drawing: {
  chapter: 'Chapter III — The Attic', title: 'The Diagram',
  text: `<p>The drawing shows the altar — a circular platform with three pedestals. The keyholes are labeled: <em>BRASS (right), BONE (center), GLASS (left)</em>. But someone has drawn a red X through the arrows and written: <em>"REVERSE IT. Right→Left→Center. That's the key."</em></p>`,

  choices: [{ text: 'Go to the cellar. Find the Bone Key.', next: 'c3_cellar', sanity: 0 }]

c3_window: {
  chapter: 'Chapter III — The Attic', title: 'The Roof',
  text: `<p>Crouching on the roof, maybe twenty feet away: something. Large. Man-shaped but wrong — too many joints in the arms, too long. It doesn't move. It is watching something on the ground below.</p>`,

c3_shoot_roof: {
  chapter: 'Chapter III — The Attic', title: 'The Shot',
  text: `<p>You aim and fire. The creature snaps around with terrifying speed. The bullet struck it but it doesn't fall. It stares at you with a face that is mostly empty, only two pale eyes in a too-wide skull. Then it drops off the roof.</p>

  chapter: 'Chapter III — The Attic', title: 'What It Watches',
  text: `<p>Then it turns its head, slowly, and looks up at your window. A long moment. Then it descends from the roof. Coming inside.</p>`,

c3_cellar_together: {
  chapter: 'Chapter III — The Deep', title: 'Down Together',
  text: `<p>Eleanor moves carefully but quickly. "There's a creature in the cellar," she says. "It guards the Bone Key. I think Thorne made it — some amalgam of things that came before. The people from the party. Or what's left of them."</p>

c3_cellar: {
  chapter: 'Chapter III — The Deep',
  title: 'The Cellar',
  text: `<p>The cellar stairs creak under you, each step releasing a breath of cold, stale air. The cellar is enormous — stone walls, barrel arches, stretching into darkness. Old wine racks, empty for a century. And somewhere ahead: movement.</p>

c3_cellar_light: {
  chapter: 'Chapter III — The Deep', title: 'Firelight',
  text: `<p>You strike a match. The cellar springs into visibility — and the creature, eight feet away, rears back with a shriek. It's enormous and wrong. While it recoils you see the Bone Key — hung on a hook on the far wall, white and carved and unmistakable.</p>`,

c3_cellar_call: {
  chapter: 'Chapter III — The Deep', title: 'Speaking to It',
  text: `<p>"I'm not here to hurt anything," you say. "I just need the key."</p>
<p>A layered voice — multiple vocal registers at once, like many people speaking in imperfect unison: <p class="ominous">"We remember being separate. We remember names. The key is ours. It is our last bone. Will you take our last bone?"</p>

  choices: [

c3_cellar_main: {
  chapter: 'Chapter III — The Deep',
  title: 'Face to Face',
  text: `<p>The creature finds you before you find it. One moment you're moving through the dark, and then it's <em>there</em>, enormous and pale, blocking the passage. It tilts its many-jointed body and regards you with pale eyes. On the wall behind it: the Bone Key.</p>`,
  minigame: 'stealth',

c3_cellar_creature: {
  chapter: 'Chapter III — The Deep', title: 'The Confrontation',
  text: `<p>The creature stops. Studies you. Then — surprisingly — it sits down. Cross-legged, like a child.</p>
<p>"You're different," it says, in those layered voices. "The others ran. Or screamed. Or tried to bind us again."</p>`,

c3_mercy_path: {
  chapter: 'Chapter III — The Deep', title: 'A Gentler Way',
  text: `<p>"I'm sorry," you say. "I won't take it by force."</p>
<p>A long silence. The creature lowers itself and produces the Bone Key. It holds it out.</p>
<p>"Then we give it freely," the layered voices say. "So the house can end. We have wanted to rest for a very long time."</p>`,

c3_take_bone_key: {
  chapter: 'Chapter III — The Deep', title: 'Taking What You Need',
  text: `<p>You move fast. Dart around the creature, grab the key from the hook, and run. The creature howls behind you — that layered, many-voiced sound — and you feel its hand clip your shoulder as you sprint for the stairs.</p>

c3_get_bone_key: {
  chapter: 'Chapter III — The Deep', title: 'The Key Is Yours',
  text: `<p>You run for the far wall while the creature writhes from the firelight. Your hand closes on the Bone Key — cool, smooth, heavy — and you pull it from the hook. The match goes out. Total darkness. The creature is recovering. You run.</p>`,

c3_fire_creature: {
  chapter: 'Chapter III — The Deep', title: 'Fire and Scream',
  text: `<p>The match lands. Something on the creature catches. It shrieks and thrashes, and in the chaos you dart to the wall and grab the Bone Key. You don't linger. Up the stairs, heart hammering.</p>`,

c4_intro: {
  chapter: 'Chapter IV — The Sub-Basement',
  title: 'Below Everything',
  text: `<p>The sub-basement is not accessible by normal means. You find it by following the pulling sensation in your chest to a section of the cellar wall that rings hollow when struck. You find the seam. The door. Beyond: a staircase carved from living rock, descending into a chamber lit by no source you can identify.</p>
<p>The altar is at the bottom. You can see it from here.</p>`,
  chapter_num: 4,
  choices: [
    { text: 'Descend to the altar.', next: 'c4_altar', sanity: 0 },
    { text: 'Call out — see if anything is already down there.', next: 'c4_call', sanity: -5 }

},
c4_call: {
  chapter: 'Chapter IV — The Sub-Basement', title: 'What Answers',
  text: `<p>Your voice echoes a strange number of times. Then a voice answers — not from below, but somewhere just beside you, invisible:</p>
<p class="ominous">"You have come so far. All three keys. Exactly as it was planned. You understand that this was never a rescue mission? You were the instrument. Every choice you made led here. I am grateful."</p>
<p>The voice is warm, cultured, amused. It is Aldous Thorne's voice.</p>`,
  sanityDelta: -10, flags: { 'thorne_spoke': true },
  choices: [
    { text: '"I know the reverse order. I\'m ending this."', next: 'c4_altar', sanity: 5 },
    { text: '"What do you want from me?"', next: 'c4_thorne_talk', sanity: 0 }
  ]
},
c4_thorne_talk: {
  chapter: 'Chapter IV — The Sub-Basement', title: 'The Architect Speaks',
  text: `<p>"What do I want?" Thorne sounds delighted. "Only to complete the work. The Hollow needs one last anchor — a living one, placed willingly in the final keyhole. The keys are symbolic. <em>You</em> are the key."</p>
<p>"I will offer you a choice, because I am generous. Complete the ritual freely, and you will be part of something eternal. Or try your reversal trick and discover whether the investigator's notes were... entirely accurate."</p>`,
  flags: { 'knows_truth_fully': true, 'thorne_offered_deal': true },
  choices: [
    { text: 'Descend to the altar. Complete the reversal.', next: 'c4_altar', sanity: 0 },
    { text: 'Ask for time to consider his offer.', next: 'c4_consider_offer', sanity: 0 }
  ]
},
c4_consider_offer: {
  chapter: 'Chapter IV — The Sub-Basement', title: 'Weighing Eternity',
  text: `<p>What does it mean to be eternal? To be the foundation of something that will outlast everything you know?</p>
<p>You think of the creature in the cellar. The voices. The many people compressed into one terrible thing. That is what eternity looks like in this house.</p>`,
  choices: [
    { text: 'Reject the offer. Go to the altar to reverse the ritual.', next: 'c4_altar', sanity: 5 },
    { text: 'Accept the offer. Become the final anchor.', next: 'ending_willing', sanity: 0 }
  ]
},
c4_altar: {
  chapter: 'Chapter IV — The Sub-Basement',
  title: 'The Altar Chamber',
  text: `<p>The altar chamber is circular and vast. The altar itself is exactly as depicted — three pedestals, three keyholes, inlaid in obsidian and lit by that sourceless light. The air here is heavier. You can feel the Hollow's attention like pressure against your skin.</p>
<p>In your possession: the keys you have gathered. The question is what to do with them.</p>`,
  minigame: 'sequence',
  choices: []
},
c4_altar_complete: {
  chapter: 'Chapter IV — The Sub-Basement', title: 'The Choice at the Altar',
  text: `<p>You stand at the altar, keys in hand. The sequence is set. You know the reversal order.</p>
<p>But Thorne's voice speaks one last time, close now, right beside your ear:</p>
<p class="ominous">"Last chance. Do it the other way. I'll let the woman go. I'll let you both leave. You have my word."</p>
<p>Silence. The house holds its breath.</p>`,
  choices: [
    { text: 'Insert: Right (Glass), then Left (Brass), then Center (Bone). Reversal.', next: 'c5_reversal', sanity: 0 },

c4_trust_thorne: {
  chapter: 'Chapter IV — The Sub-Basement', title: 'The Deal',
  text: `<p>You insert the keys in the original order. The Hollow takes form — enormous, beautiful, terrible. It regards you for a moment. Then steps through you, through the floor, through the earth itself. Gone.</p>
<p>The house shudders. Settles. And then the front door swings open. Moonlight pours in. Thorne kept his word. Mostly.</p>`,
  choices: [{ text: 'Walk out the front door.', next: 'ending_let_it_out', sanity: 0 }]
},
c4_smash_altar: {
  chapter: 'Chapter IV — The Sub-Basement', title: 'The Breaking',
  text: `<p>You bring the keys down on the altar with both fists. The obsidian cracks. You keep smashing until the altar is rubble. The Hollow <em>screams</em>. It was bound to this altar. You have not freed it — you have wounded it. It pours itself into the walls, spreading thin and desperate. The house begins to collapse from the bottom up.</p>`,
  choices: [{ text: 'Run. The only way out is up and out.', next: 'ending_collapse', sanity: 0 }]
},
c5_reversal: {
  chapter: 'Chapter V — Resolution', title: 'The Reversal',
  text: `<p>Right key. Left key. Center key. The moment the third key turns, the altar explodes with light — honest, clear, brilliant white. The Hollow shrieks. The harmonic hum in the walls rises and then simply <em>stops</em>.</p>
<p>The house goes quiet. Then, section by section, it begins to fall. You have seconds.</p>`,
  choices: [
    { text: 'Run for the front door — through the house.', next: 'ending_escape', sanity: 0 },
    { text: 'Go back for Eleanor — she might still be in the attic.', next: 'ending_escape_both', sanity: 0, requireFlag: 'eleanor_alive' },
    { text: 'Stand still. Let it take you.', next: 'ending_buried', sanity: 0 }
  ]
},
ending_escape: {
  chapter: 'Ending I', title: 'The Survivor',
  text: `<p>You run faster than you have ever run. The house collapses behind you like a wave. You hit the front door at full speed and tumble into the moonlit garden as behind you Thorne House folds inward with a deep, terminal groan.</p>
<p>Then silence. A vast pile of rubble. No house. No Hollow. No Thorne.</p>
<p>You sit on the grass, bleeding from a dozen small wounds, and breathe the outside air for a long time.</p>
<p class="ominous">But you notice, walking down the road, that you cast no shadow.</p>`,
  ending: true, endingId: 'survivor', achieves: 'survivor'
},
ending_escape_both: {
  chapter: 'Ending II', title: 'Two Who Left',
  text: `<p>You find Eleanor still in the attic. You reach her with seconds to spare — grab her hand — and run. The house collapses precisely as your feet leave the front step.</p>
<p>"You know what's strange?" Eleanor says, as dawn breaks. "The investigator who sent me here — his name was Thorne. Said he was a descendant." She pauses. "He gave me your description. Said you'd come."</p>
<p>You look at the rubble. You think about this for a long time.</p>`,
  ending: true, endingId: 'both_escape', achieves: 'survivor'
},
ending_sacrifice: {
  chapter: 'Ending III', title: 'The Willing',
  text: `<p>You set the keys aside. You climb onto the altar and lie down. The Hollow flows into you — completely, like water into a vessel shaped for it. You feel it settle. After a moment of terrible fullness, it simply... quiets. Held.</p>
<p>You stand up. You walk to the front door. You walk out into the world. You are its warden now.</p>
<p>It is a quiet life. A necessary one.</p>`,
  ending: true, endingId: 'sacrifice', achieves: 'sacrifice'
