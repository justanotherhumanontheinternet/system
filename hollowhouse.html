// ═══════════════════════════════════════════════════════════════
// GAME ENGINE
// ═══════════════════════════════════════════════════════════════
let mgCallback = null;
let investigateCount = 0;
let fleeCount = 0;
let neverFled = true;
let mgTimerInterval = null;

function unlockAchievement(id) {
  if (!ACHIEVEMENTS[id] || ACHIEVEMENTS[id].unlocked) return;
  ACHIEVEMENTS[id].unlocked = true;
  STATE.achievements[id] = true;
  SOUND.sfx.achievement();
  showToast(ACHIEVEMENTS[id].label, ACHIEVEMENTS[id].desc);
  renderAchievements();
  document.getElementById('hud-ach').textContent = Object.keys(STATE.achievements).length;
}

function showToast(title, msg) {
  const t = document.getElementById('toast');
  document.querySelector('.toast-title').textContent = '🏆 ' + title;
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

function renderAchievements() {
  const grid = document.getElementById('achievements-grid');
  grid.innerHTML = Object.entries(ACHIEVEMENTS).map(([id, a]) => {
    if (a.unlocked) {
      return `<div class="ach-badge unlocked">
        <span class="ach-icon">${a.icon}</span>
        <span class="ach-label">${a.label}</span>
        <span class="ach-tip">${a.desc}</span>
      </div>`;
    } else {
      return `<div class="ach-badge locked" title="???">
        <span class="ach-icon">${a.icon}</span>
        <span class="ach-label" style="color:var(--border)">???</span>
      </div>`;
    }
  }).join('');
}

function updateHUD() {
  document.getElementById('hud-chapter').textContent = STATE.chapter;
  document.getElementById('hud-sanity').textContent = STATE.sanity;
  document.getElementById('hud-decisions').textContent = STATE.decisions;
  const bar = document.getElementById('sanity-bar');
  bar.style.width = STATE.sanity + '%';
  bar.style.background = STATE.sanity > 60 ? 'var(--teal-bright)' :
                          STATE.sanity > 30 ? '#a0820a' : 'var(--crimson)';
  if (STATE.sanity <= 20) unlockAchievement('low_sanity');
  if (STATE.sanity <= 20 && STATE.sanity > 0) SOUND.sfx.heartbeat();
}

function goToScene(sceneId, skipHistory) {
  const scene = SCENES[sceneId];
  if (!scene) return;

  if (!skipHistory) {
    STATE.history.push({ sceneId, title: scene.title });
    STATE.decisions++;
    if (STATE.decisions === 1) unlockAchievement('first_choice');
    if (STATE.decisions === 10) unlockAchievement('ten_decisions');
    if (STATE.decisions === 20) unlockAchievement('twenty_decisions');
  }

  STATE.current = sceneId;
  if (scene.chapter_num) STATE.chapter = scene.chapter_num;

  if (scene.sanityDelta) {
    STATE.sanity = Math.max(0, Math.min(100, STATE.sanity + scene.sanityDelta));
  }
  if (scene.flags) Object.assign(STATE.flags, scene.flags);

  // Check achievements
  if (STATE.flags.all_clues_check) {
    const clues = ['clue_1','clue_2','clue_3','clue_4','clue_5'];
    if (clues.every(c => STATE.flags[c])) unlockAchievement('all_clues');
  }
  if (STATE.flags.knows_history && STATE.flags.knows_ritual && STATE.flags.knows_three_keys &&
      STATE.flags.found_thorne_body && STATE.flags.knows_eleanor) {
    unlockAchievement('truth_seeker');
  }
  if (scene.achieves) unlockAchievement(scene.achieves);

  updateHUD();
  SOUND.setScene(sceneId);
  renderScene(scene, sceneId);
  renderHistory();

  if (scene.ending) {
    setTimeout(() => showEnding(scene), 2000);
  }
}

function renderScene(scene, sceneId) {
  document.getElementById('scene-chapter').textContent = scene.chapter || '';
  document.getElementById('scene-title').textContent = scene.title || '';
  document.getElementById('scene-text').innerHTML = scene.text || '';
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  document.getElementById('game-panel').classList.remove('fade-in');
  void document.getElementById('game-panel').offsetWidth;
  document.getElementById('game-panel').classList.add('fade-in');

  // Play appropriate SFX
  if (scene.text && scene.text.includes('whisper')) SOUND.sfx.whisper();
  else if (scene.title && (scene.title.toLowerCase().includes('door') || scene.title.toLowerCase().includes('foyer'))) SOUND.sfx.door();

  if (scene.minigame) {
    const mg = MINIGAMES[scene.minigame];
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = '▶ Attempt the challenge...';
    btn.onclick = () => { SOUND.sfx.click(); openMinigame(scene.minigame, mg); };
    choicesEl.appendChild(btn);
    return;
  }

  const validChoices = (scene.choices || []).filter(c => {
    if (c.requireFlag && !STATE.flags[c.requireFlag]) return false;
    return true;
  });

  validChoices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice.text;
    btn.onclick = () => { SOUND.sfx.click(); makeChoice(choice, sceneId, i); };
    choicesEl.appendChild(btn);
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function makeChoice(choice, fromScene, idx) {
  const investigateKeywords = ['examine', 'search', 'look', 'read', 'inspect'];
  if (investigateKeywords.some(k => choice.text.toLowerCase().includes(k))) {
    investigateCount++;
    if (investigateCount >= 5) unlockAchievement('curious');
  }
  if (choice.text.toLowerCase().includes('run') || choice.text.toLowerCase().includes('flee') || choice.text.toLowerCase().includes('retreat')) {
    fleeCount++;
    neverFled = false;
    if (fleeCount >= 3) unlockAchievement('coward');
  }
  if (choice.flags) Object.assign(STATE.flags, choice.flags);
  if (choice.sanity) STATE.sanity = Math.max(0, Math.min(100, STATE.sanity + choice.sanity));
  if (choice.achieves) unlockAchievement(choice.achieves);

  if (STATE.history.length > 0) {
    STATE.history[STATE.history.length - 1].choiceIdx = idx;
    STATE.history[STATE.history.length - 1].choiceText = choice.text;
  }

  goToScene(choice.next);
}

function renderHistory() {
  const btns = document.getElementById('history-btns');
  btns.innerHTML = '';
  STATE.history.forEach((h, i) => {
    const b = document.createElement('button');
    b.className = 'hist-btn' + (i === STATE.history.length - 1 ? ' current' : '');
    b.textContent = `${i + 1}. ${h.title.slice(0, 20)}${h.title.length > 20 ? '…' : ''}`;
    b.title = h.title;
    b.onclick = () => revisitHistory(i);
    btns.appendChild(b);
  });
}

function revisitHistory(idx) {
  const h = STATE.history[idx];
  if (!h) return;
  const scene = SCENES[h.sceneId];
  if (!scene) return;

  document.getElementById('scene-chapter').textContent = scene.chapter || '';
  document.getElementById('scene-title').textContent = '[History] ' + scene.title;
  document.getElementById('scene-text').innerHTML = scene.text || '';
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  if (h.choiceText) {
    const info = document.createElement('div');
    info.style.cssText = 'font-family:var(--mono);font-size:0.78rem;color:var(--teal);margin-bottom:10px;padding:8px 12px;background:var(--deep);border-left:2px solid var(--teal);border-radius:3px;';
    info.textContent = '✓ You chose: "' + h.choiceText + '"';
    choicesEl.appendChild(info);
  }

  const returnBtn = document.createElement('button');
  returnBtn.className = 'choice-btn';
  returnBtn.textContent = '↩ Return to present';
  returnBtn.onclick = () => {
    const cur = SCENES[STATE.current];
    if (cur) renderScene(cur, STATE.current);
    renderHistory();
  };
  choicesEl.appendChild(returnBtn);

  document.getElementById('game-panel').classList.remove('fade-in');
  void document.getElementById('game-panel').offsetWidth;
  document.getElementById('game-panel').classList.add('fade-in');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════════════
// DEATH SYSTEM
// ═══════════════════════════════════════════════════════════════
function triggerDeath(deathMsg) {
  clearMgTimer();
  document.getElementById('minigame-overlay').classList.remove('active');
  SOUND.sfx.death();
  // Blood drips
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const drip = document.createElement('div');
      drip.className = 'blood-drip';
      drip.style.left = (Math.random() * 100) + 'vw';
      drip.style.height = (40 + Math.random() * 60) + 'px';
      drip.style.animationDuration = (1.5 + Math.random()) + 's';
      document.body.appendChild(drip);
      setTimeout(() => drip.remove(), 3000);
    }, i * 150);
  }

  document.getElementById('death-msg').textContent = deathMsg || 'The house has claimed you.';
  document.getElementById('death-stats').innerHTML =
    `Decisions made: ${STATE.decisions} &nbsp;|&nbsp; Sanity remaining: ${STATE.sanity}% &nbsp;|&nbsp; Chapter: ${STATE.chapter}`;

  setTimeout(() => {
    document.getElementById('death-screen').classList.add('active');
  }, 800);
}

function triggerRestart() {
  document.getElementById('death-screen').classList.remove('active');
  restartGame();
}

// ═══════════════════════════════════════════════════════════════
// MINIGAME ENGINE
// ═══════════════════════════════════════════════════════════════
function clearMgTimer() {
  if (mgTimerInterval) { clearInterval(mgTimerInterval); mgTimerInterval = null; }
}

function startMgTimer(seconds, barEl, labelEl, onExpire) {
  clearMgTimer();
  let remaining = seconds;
  const update = () => {
    const pct = (remaining / seconds) * 100;
    if (barEl) {
      barEl.style.width = pct + '%';
      barEl.style.background = pct > 50 ? 'var(--teal-bright)' : pct > 25 ? '#a0820a' : 'var(--crimson)';
    }
    if (labelEl) labelEl.textContent = remaining + 's';
    if (remaining <= 10) SOUND.sfx.tick();
    remaining--;
    if (remaining < 0) {
      clearMgTimer();
      onExpire();
    }
  };
  update();
  mgTimerInterval = setInterval(update, 1000);
}

function renderLives(count, max) {
  let html = '<div class="mg-attempts-left">';
  for (let i = 0; i < max; i++) {
    html += `<span class="life ${i >= count ? 'dead' : ''}">♥</span>`;
  }
  html += '</div>';
  return html;
}

function openMinigame(key, mg) {
  SOUND.playMinigame();
  document.getElementById('mg-label').textContent = mg.label;
  document.getElementById('mg-title').textContent = mg.title;
  document.getElementById('mg-desc').textContent = mg.desc;
  document.getElementById('mg-result-area').innerHTML = '';
  const content = document.getElementById('minigame-content');
  content.innerHTML = '';
  document.getElementById('minigame-overlay').classList.add('active');
  mgCallback = mg;

  switch (mg.type) {
    case 'codelock': initCodeLock(content, mg); break;
    case 'memory': initMemory(content, mg); break;
    case 'stealth': initStealth(content, mg); break;
    case 'cipher': initCipher(content, mg); break;
    case 'sequence': initSequence(content, mg); break;
  }
}

function closeMgSuccess() {
  clearMgTimer();
  const next = mgCallback.onSuccess;
  mgCallback = null;
  document.getElementById('minigame-overlay').classList.remove('active');
  SOUND.endMinigame(next);
  goToScene(next);
}

function closeMgDeath() {
  clearMgTimer();
  const msg = mgCallback ? mgCallback.deathMsg : 'The house has claimed you.';
  mgCallback = null;
  triggerDeath(msg);
}

// ── CODE LOCK ──
function initCodeLock(el, mg) {
  let digits = [0, 0, 0];
  let firstTry = true;
  let attempts = 0;
  const maxA = mg.maxAttempts || 3;

  el.innerHTML = `
    <div class="mg-timer-wrap">
      <div class="mg-timer-label"><span>TIME REMAINING</span><span id="cl-time">${mg.timeLimit}s</span></div>
      <div class="mg-timer-bg"><div class="mg-timer-bar" id="cl-tbar" style="width:100%"></div></div>
    </div>
    ${renderLives(maxA, maxA).replace('mg-attempts-left', 'mg-attempts-left')}
    <div id="cl-lives-wrap">${renderLives(maxA, maxA)}</div>
    <div class="code-hint" style="margin-top:10px">Click digits to increment. Submit when ready.</div>
    <div class="code-lock" id="cl-digits">
      ${digits.map((d,i) => `<div class="code-digit" id="cd-${i}" onclick="clClick(${i})">${d}</div>`).join('')}
    </div>
    <br>
    <button class="mg-btn" onclick="clSubmit()">Submit Code</button>
  `;

  startMgTimer(mg.timeLimit,
    document.getElementById('cl-tbar'),
    document.getElementById('cl-time'),
    () => { document.getElementById('mg-result-area').innerHTML = '<div class="mg-result fail">⏱ Time expired. The mechanism locks permanently.</div>'; setTimeout(closeMgDeath, 1500); }
  );

  window.clClick = (i) => {
    digits[i] = (digits[i] + 1) % 10;
    document.getElementById('cd-'+i).textContent = digits[i];
    SOUND.sfx.tick();
  };
  window.clSubmit = () => {
    attempts++;
    const livesLeft = maxA - attempts;
    const correct = mg.solution.every((s, i) => s === digits[i]);
    if (correct) {
      clearMgTimer();
      if (firstTry) unlockAchievement('code_breaker');
      SOUND.sfx.success();
      document.getElementById('mg-result-area').innerHTML = '<div class="mg-result success">✓ The lock clicks open.</div>';
      setTimeout(closeMgSuccess, 1500);
    } else {
      firstTry = false;
      SOUND.sfx.fail();
      digits.forEach((_,i) => {
        const el2 = document.getElementById('cd-'+i);
        el2.classList.add('wrong');
        setTimeout(() => el2.classList.remove('wrong'), 400);
      });
      document.getElementById('cl-lives-wrap').innerHTML = renderLives(Math.max(0, livesLeft), maxA);
      if (livesLeft <= 0) {
        clearMgTimer();
        document.getElementById('mg-result-area').innerHTML = '<div class="mg-result fail">✗ Too many wrong attempts. The alarm triggers.</div>';
        setTimeout(closeMgDeath, 1800);
      } else {
        document.getElementById('mg-result-area').innerHTML = `<div class="mg-result fail">✗ Wrong. ${livesLeft} attempt${livesLeft !== 1 ? 's' : ''} remaining.</div>`;
      }
    }
  };
}

// ── MEMORY GAME ──
function initMemory(el, mg) {
  const symbols = ['🕯️','💀','🔑','🪞','🗡️','🕰️','📜','🔮'];
  const cards = [...symbols, ...symbols].sort(() => Math.random() - 0.5);
  let flipped = [], matched = [], locked = false, errors = 0;
  const maxE = mg.maxErrors || 5;
  let firstFlip = true;

  el.innerHTML = `
    <div class="mg-timer-wrap">
      <div class="mg-timer-label"><span>TIME REMAINING</span><span id="mem-time">${mg.timeLimit}s</span></div>
      <div class="mg-timer-bg"><div class="mg-timer-bar" id="mem-tbar" style="width:100%"></div></div>
    </div>
    <div id="mem-lives-wrap">${renderLives(maxE, maxE)}</div>
    <div class="memory-grid" id="mem-grid">${
      cards.map((s,i) => `<div class="mem-card" id="mc-${i}" onclick="mcClick(${i})"><span class="card-face">${s}</span></div>`).join('')
    }</div>
    <div id="mem-msg" style="font-family:var(--mono);font-size:0.75rem;color:var(--ash);text-align:center;margin-top:8px;"></div>
  `;

  startMgTimer(mg.timeLimit,
    document.getElementById('mem-tbar'),
    document.getElementById('mem-time'),
    () => { document.getElementById('mg-result-area').innerHTML = '<div class="mg-result fail">⏱ Time ran out. The bookcase sealed itself.</div>'; setTimeout(closeMgDeath, 1500); }
  );

  window.mcClick = (i) => {
    if (locked || flipped.includes(i) || matched.includes(i)) return;
    const card = document.getElementById('mc-'+i);
    card.classList.add('flipped');
    flipped.push(i);
    SOUND.sfx.tick();
    if (flipped.length === 2) {
      locked = true;
      const [a, b] = flipped;
      if (cards[a] === cards[b]) {
        matched.push(a, b);
        document.getElementById('mc-'+a).classList.add('matched');
        document.getElementById('mc-'+b).classList.add('matched');
        flipped = []; locked = false;
        if (matched.length === cards.length) {
          clearMgTimer();
          if (errors === 0) unlockAchievement('memory_master');
          SOUND.sfx.success();
          document.getElementById('mg-result-area').innerHTML = '<div class="mg-result success">✓ All pairs matched. The bookcase swings open.</div>';
          setTimeout(closeMgSuccess, 1500);
        }
      } else {
        errors++;
        SOUND.sfx.fail();
        const livesLeft = maxE - errors;
        document.getElementById('mem-lives-wrap').innerHTML = renderLives(Math.max(0, livesLeft), maxE);
        document.getElementById('mem-msg').textContent = `Errors: ${errors} / ${maxE}`;
        setTimeout(() => {
          if (errors >= maxE) {
            clearMgTimer();
            document.getElementById('mg-result-area').innerHTML = '<div class="mg-result fail">✗ Too many errors. The mechanism jams permanently.</div>';
            setTimeout(closeMgDeath, 1800);
            return;
          }
          document.getElementById('mc-'+a).classList.remove('flipped');
          document.getElementById('mc-'+b).classList.remove('flipped');
          flipped = []; locked = false;
        }, 900);
      }
    }
  };
}

// ── STEALTH GAME ──
function initStealth(el, mg) {
  let phase = 0, barVal = 0, dir = 1, lives, timerActive = false;
  let stealthAnimId = null;
  const safeRanges = [[65, 90], [10, 35], [45, 75]];
  const maxL = mg.maxLives || 3;
  lives = maxL;
  let perfectRun = true;
  let overallTimeout = null;

  function renderPhase() {
    barVal = 50; dir = 1;
    el.innerHTML = `
      <div class="mg-timer-wrap">
        <div class="mg-timer-label"><span>OVERALL TIME</span><span id="st-time">${mg.timeLimit}s</span></div>
        <div class="mg-timer-bg"><div class="mg-timer-bar" id="st-tbar" style="width:100%"></div></div>
      </div>
      <div id="st-lives-wrap">${renderLives(lives, maxL)}</div>
      <div style="text-align:center;font-family:var(--mono);font-size:0.78rem;color:var(--ash);margin:10px 0;">Phase ${phase+1} of 3 — Hit MOVE when bar is <span style="color:var(--teal-bright)">green</span></div>
      <div style="margin-bottom:14px;position:relative;">
        <div class="stealth-bar-bg"><div class="stealth-bar" id="sbar" style="width:50%"></div></div>
        <div style="position:absolute;top:-2px;left:${safeRanges[phase][0]}%;width:${safeRanges[phase][1]-safeRanges[phase][0]}%;height:14px;background:var(--teal);opacity:0.3;pointer-events:none;border-radius:6px;"></div>
      </div>
      <div class="stealth-zones"><button class="stealth-zone" id="st-btn" onclick="stAct()">MOVE</button></div>
      <div id="st-msg" style="font-family:var(--mono);font-size:0.75rem;text-align:center;margin-top:8px;"></div>
    `;

    if (phase === 0) {
      startMgTimer(mg.timeLimit, document.getElementById('st-tbar'), document.getElementById('st-time'), () => {
        if (stealthAnimId) cancelAnimationFrame(stealthAnimId);
        document.getElementById('mg-result-area').innerHTML = '<div class="mg-result fail">⏱ The creature heard your breathing. Time ran out.</div>';
        setTimeout(closeMgDeath, 1500);
      });
    } else {
      // Update label reference only
      const tbar = document.getElementById('st-tbar');
      const tlabel = document.getElementById('st-time');
      // Timer already running; just update DOM references each phase
    }

    const speed = 1.5 + phase * 0.6;
    function animate() {
      barVal += dir * speed;
      if (barVal >= 100) { barVal = 100; dir = -1; }
      if (barVal <= 0) { barVal = 0; dir = 1; }
      const sbar = document.getElementById('sbar');
      if (sbar) {
        sbar.style.width = barVal + '%';
        const inZone = barVal >= safeRanges[phase][0] && barVal <= safeRanges[phase][1];
        sbar.style.background = inZone ? 'var(--teal-bright)' : 'var(--crimson)';
      }
      stealthAnimId = requestAnimationFrame(animate);
    }
    stealthAnimId = requestAnimationFrame(animate);
  }

  window.stAct = () => {
    const inZone = barVal >= safeRanges[phase][0] && barVal <= safeRanges[phase][1];
    if (stealthAnimId) cancelAnimationFrame(stealthAnimId);
    stealthAnimId = null;
    if (inZone) {
      SOUND.sfx.success();
      document.getElementById('st-msg').innerHTML = `<span style="color:var(--teal-bright)">✓ Phase ${phase+1} passed. Stay silent...</span>`;
      document.getElementById('st-btn').disabled = true;
      phase++;
      if (phase >= 3) {
        clearMgTimer();
        if (perfectRun) unlockAchievement('stealth_god');
        document.getElementById('mg-result-area').innerHTML = '<div class="mg-result success">✓ You slip past the creature and reach the key.</div>';
        setTimeout(closeMgSuccess, 1500);
      } else {
        setTimeout(renderPhase, 1200);
      }
    } else {
      lives--;
      perfectRun = false;
      SOUND.sfx.fail();
      document.getElementById('st-lives-wrap').innerHTML = renderLives(lives, maxL);
      if (lives <= 0) {
        clearMgTimer();
        document.getElementById('mg-result-area').innerHTML = '<div class="mg-result fail">✗ The creature heard you. It has you now.</div>';
        setTimeout(closeMgDeath, 1800);
        return;
      }
      document.getElementById('st-msg').innerHTML = `<span style="color:var(--crimson)">✗ Too early! ${lives} ${lives===1?'chance':'chances'} left.</span>`;
      setTimeout(() => {
        if (stealthAnimId === null) renderPhase();
      }, 1200);
    }
  };

  renderPhase();
}

// ── CIPHER ──
function initCipher(el, mg) {
  let attempts = 0;
  let firstTry = true;
  const maxA = mg.maxAttempts || 3;

  el.innerHTML = `
    <div class="mg-timer-wrap">
      <div class="mg-timer-label"><span>TIME REMAINING</span><span id="ci-time">${mg.timeLimit}s</span></div>
      <div class="mg-timer-bg"><div class="mg-timer-bar" id="ci-tbar" style="width:100%"></div></div>
    </div>
    <div id="ci-lives-wrap">${renderLives(maxA, maxA)}</div>
    <div class="cipher-table">
      ${Array.from({length:26},(_,i)=>`<div class="cipher-pair">${String.fromCharCode(65+i)}=${i+1}</div>`).join('')}
    </div>
    <div style="font-family:var(--mono);font-size:0.78rem;color:var(--ash);margin-bottom:10px;">
      "BONE" → sum the digits of each letter's value → 4-digit code
    </div>
    <input class="riddle-input" id="cipher-in" type="text" maxlength="4" placeholder="Enter 4-digit code" />
    <br><br>
    <button class="mg-btn" onclick="cipherSubmit()">Submit</button>
  `;

  startMgTimer(mg.timeLimit,
    document.getElementById('ci-tbar'),
    document.getElementById('ci-time'),
    () => { document.getElementById('mg-result-area').innerHTML = '<div class="mg-result fail">⏱ Time expired. The trap triggers.</div>'; setTimeout(closeMgDeath, 1500); }
  );

  document.getElementById('cipher-in').addEventListener('keydown', e => { if (e.key === 'Enter') window.cipherSubmit(); });

  window.cipherSubmit = () => {
    attempts++;
    const livesLeft = maxA - attempts;
    const val = document.getElementById('cipher-in').value.trim();
    // B=2(2), O=15(1+5=6), N=14(1+4=5), E=5(5) → 2655
    if (val === '2655') {
      clearMgTimer();
      if (firstTry) unlockAchievement('riddler');
      SOUND.sfx.success();
      document.getElementById('mg-result-area').innerHTML = '<div class="mg-result success">✓ The dial spins and the chest unlocks.</div>';
      setTimeout(closeMgSuccess, 1500);
    } else {
      firstTry = false;
      SOUND.sfx.fail();
      document.getElementById('ci-lives-wrap').innerHTML = renderLives(Math.max(0, livesLeft), maxA);
      if (livesLeft <= 0) {
        clearMgTimer();
        document.getElementById('mg-result-area').innerHTML = '<div class="mg-result fail">✗ The needle springs. Wrong one too many times.</div>';
        setTimeout(closeMgDeath, 1800);
      } else {
        document.getElementById('mg-result-area').innerHTML = `<div class="mg-result fail">✗ The dial doesn't respond. ${livesLeft} attempt${livesLeft !== 1 ? 's' : ''} left.</div>`;
        document.getElementById('cipher-in').value = '';
      }
    }
  };
}

// ── SEQUENCE GAME ──
function initSequence(el, mg) {
  const colors = ['#8b0000','#2d5a5a','#7a5a00','#3a3a7a'];
  const labels = ['RED','TEAL','GOLD','INDIGO'];
  let sequence = [], playerSeq = [], round = 0, maxRound = 3;
  let playing = false, lives, perfect = true;
  const maxL = mg.maxLives || 2;
  lives = maxL;

  el.innerHTML = `
    <div class="mg-timer-wrap">
      <div class="mg-timer-label"><span>TIME REMAINING</span><span id="sq-time">${mg.timeLimit}s</span></div>
      <div class="mg-timer-bg"><div class="mg-timer-bar" id="sq-tbar" style="width:100%"></div></div>
    </div>
    <div id="sq-lives-wrap">${renderLives(lives, maxL)}</div>
    <div class="simon-grid" id="simon">
      ${colors.map((c,i)=>`<div class="simon-btn" id="sb-${i}" style="background:${c}" onclick="simonClick(${i})">${labels[i]}</div>`).join('')}
    </div>
    <div id="simon-msg" style="text-align:center;margin-top:12px;font-family:var(--mono);font-size:0.78rem;color:var(--ash);">Watch the sequence...</div>
  `;

  startMgTimer(mg.timeLimit,
    document.getElementById('sq-tbar'),
    document.getElementById('sq-time'),
    () => { document.getElementById('mg-result-area').innerHTML = '<div class="mg-result fail">⏱ The altar grows cold. The Hollow reaches for you.</div>'; setTimeout(closeMgDeath, 1500); }
  );

  function flash(idx, cb) {
    const btn = document.getElementById('sb-'+idx);
    if (!btn) { cb && cb(); return; }
    btn.classList.add('active');
    SOUND.sfx.tick();
    const delay = Math.max(200, 500 - round * 80);
    setTimeout(() => { btn.classList.remove('active'); cb && setTimeout(cb, Math.max(100, 300 - round * 50)); }, delay);
  }

  function playSequence() {
    playing = true; playerSeq = [];
    let i = 0;
    const go = () => {
      if (i >= sequence.length) { playing = false; document.getElementById('simon-msg').textContent = `Your turn — repeat ${sequence.length} steps!`; return; }
      flash(sequence[i], go); i++;
    };
    setTimeout(go, 600);
  }

  window.simonClick = (idx) => {
    if (playing) return;
    flash(idx, null);
    playerSeq.push(idx);
    const pos = playerSeq.length - 1;
    if (playerSeq[pos] !== sequence[pos]) {
      lives--;
      perfect = false;
      SOUND.sfx.fail();
      document.getElementById('sq-lives-wrap').innerHTML = renderLives(Math.max(0, lives), maxL);
      if (lives <= 0) {
        clearMgTimer();
        document.getElementById('mg-result-area').innerHTML = '<div class="mg-result fail">✗ Wrong sequence. The Hollow surges through.</div>';
        setTimeout(closeMgDeath, 1800);
        return;
      }
      document.getElementById('simon-msg').textContent = `✗ Wrong! Starting round again... (${lives} ${lives===1?'life':'lives'} left)`;
      playerSeq = [];
      setTimeout(playSequence, 1400);
      return;
    }
    if (playerSeq.length === sequence.length) {
      round++;
      if (round >= maxRound) {
        clearMgTimer();
        if (perfect) unlockAchievement('sequence_keeper');
        SOUND.sfx.success();
        document.getElementById('mg-result-area').innerHTML = '<div class="mg-result success">✓ The altar resonates. The mechanism engages.</div>';
        setTimeout(closeMgSuccess, 1500);
      } else {
        document.getElementById('simon-msg').textContent = `✓ Round ${round} complete! Faster now...`;
        sequence.push(Math.floor(Math.random()*4));
        setTimeout(playSequence, 1200);
      }
    }
  };

  // Starts with 4 random steps instead of 2. 
  // Round 1 = 4 steps, Round 2 = 5 steps, Round 3 = 6 steps.
  sequence = [
    Math.floor(Math.random()*4), 
    Math.floor(Math.random()*4),
    Math.floor(Math.random()*4),
    Math.floor(Math.random()*4)
  ];
  setTimeout(playSequence, 800);
}

// ═══════════════════════════════════════════════════════════════
// ENDING
// ═══════════════════════════════════════════════════════════════
function showEnding(scene) {
  STATE.endingReached = scene.endingId;
  document.getElementById('game-panel').style.display = 'none';
  document.getElementById('history-nav').style.display = 'none';
  document.getElementById('achievements-panel').style.display = 'none';

  const endingScreen = document.getElementById('ending-screen');
  endingScreen.classList.add('active');

  const endings = ['survivor','both_escape','sacrifice','buried','burned','collapse','willing','let_it_out','truth'];
  const num = endings.indexOf(scene.endingId) + 1;

  document.getElementById('ending-tag').textContent = `ENDING ${num} OF ${endings.length}`;
  document.getElementById('ending-title').textContent = scene.title;
  document.getElementById('ending-text').innerHTML = scene.text;

  const achCount = Object.keys(STATE.achievements).length;
  document.getElementById('ending-stats').innerHTML = `
    <div class="ending-stat">Decisions Made<span>${STATE.decisions}</span></div>
    <div class="ending-stat">Final Sanity<span>${STATE.sanity}%</span></div>
    <div class="ending-stat">Achievements<span>${achCount} / ${Object.keys(ACHIEVEMENTS).length}</span></div>
    <div class="ending-stat">Ending<span>${num} / ${endings.length}</span></div>
  `;

  if (scene.achieves) unlockAchievement(scene.achieves);
  if (neverFled && STATE.decisions > 5) unlockAchievement('brave');
  renderAchievements();
  document.getElementById('achievements-panel').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartGame() {
  clearMgTimer();
  const savedAch = { ...STATE.achievements };
  Object.assign(STATE, {
    current: 'start', sanity: 100, chapter: 1, decisions: 0,
    flags: {}, history: [], endingReached: null, achievements: savedAch
  });
  investigateCount = 0; fleeCount = 0; neverFled = true;

  document.getElementById('game-panel').style.display = '';
  document.getElementById('history-nav').style.display = '';
  document.getElementById('achievements-panel').style.display = '';
  document.getElementById('ending-screen').classList.remove('active');
  document.getElementById('death-screen').classList.remove('active');
  document.getElementById('minigame-overlay').classList.remove('active');

  Object.entries(savedAch).forEach(([id]) => { if (ACHIEVEMENTS[id]) ACHIEVEMENTS[id].unlocked = true; });
  renderAchievements();
  document.getElementById('hud-ach').textContent = Object.keys(savedAch).length;
  goToScene('start', true);
}

// ═══════════════════════════════════════════════════════════════
// INIT — start music immediately
// ═══════════════════════════════════════════════════════════════
renderAchievements();
goToScene('start', true);

// Start music on first user interaction
document.addEventListener('click', () => { SOUND.init(); SOUND.setScene('start'); }, { once: true });
document.addEventListener('keydown', () => { SOUND.init(); SOUND.setScene('start'); }, { once: true });

// Mark music pill as on by default
document.getElementById('music-pill').style.borderColor = 'var(--teal)';
document.getElementById('music-pill').style.color = 'var(--teal-bright)';
</script>
